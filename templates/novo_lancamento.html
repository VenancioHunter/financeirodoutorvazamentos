{% extends "layout.html" %} {% block title %}Novo Lançamento{% endblock %} {%
block content %}

<style>
  .page-title {
    font-weight: 800;
    color: #0d5590;
    margin: 20px 0 5px;
    text-align: center;
  }

  .page-subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
    font-size: 0.9rem;
  }

  .form-card {
    background: #ffffff;
    border-radius: 18px;
    padding: 30px;
    max-width: 750px;
    margin: 0 auto;
    box-shadow: 0 6px 22px rgba(0, 0, 0, 0.08);
  }

  .form-label,
  label {
    font-size: 0.75rem;
    font-weight: 700;
    color: #0d5590;
    text-transform: uppercase;
  }

  .form-control,
  .form-select {
    border-radius: 12px;
    padding: 12px;
    font-size: 0.9rem;
    border: 1px solid #cfd6dd;
  }

  .form-control:focus,
  .form-select:focus {
    border-color: #0d5590;
    box-shadow: 0 0 0 0.15rem rgba(13, 85, 144, 0.25);
  }

  .section-divider {
    margin: 25px 0 15px;
    border-top: 1px solid #e5e7eb;
  }

  .btn-submit {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    font-size: 1.1rem;
    font-weight: 700;
    background: #0d5590;
    border: none;
    transition: 0.2s;
  }

  .btn-submit:hover {
    background: #083a63;
    transform: translateY(-2px);
  }
</style>

<h2 class="page-title">Novo Lançamento</h2>
<p class="page-subtitle">Registrar receita ou despesa no sistema</p>

<div class="form-card">
  <form id="lancamentoForm" method="post" action="/post_lancamento">
    <!-- TIPO -->
    <div class="mb-3">
      <label>Tipo</label>
      <select class="form-select" name="typeTransaction" required>
        <option value="c">Receita</option>
        <option value="d">Despesa</option>
      </select>
    </div>

    <div class="section-divider"></div>

    <!-- ORIGEM -->
    <div class="mb-3">
      <label>Origem</label>
      <select class="form-select" name="origem" required>
        {% for id in destinatarios %}
        <option value="{{destinatarios[id]}}">{{destinatarios[id]}}</option>
        {% endfor %}
      </select>
    </div>

    <!-- VALOR / DATA -->
    <div class="row mb-3">
      <div class="col-md-6">
        <label>Valor (R$)</label>
        <input class="form-control" name="amount" id="amount" required />
      </div>
      <div class="col-md-6">
        <label>Data</label>
        <input
          class="form-control"
          type="date"
          id="date"
          name="date"
          required
        />
      </div>
    </div>

    <!-- CATEGORIA -->
    <div class="mb-3">
      <label>Categoria</label>
      <select id="categoria" class="form-select" name="categoria" required>
        <option>Selecionar</option>
        <option value="pessoal">Pessoal</option>
        <option value="publicidade">Publicidade</option>
        <option value="escritório">Escritório</option>
        <option value="comissão">Comissão</option>
        <option class="transporte">Transporte</option>
      </select>
    </div>

    <!-- ESPÉCIE -->
    <div class="mb-3">
      <label>Espécie</label>
      <select id="especie" class="form-select" name="especie">
        <option value="">Selecione primeiro uma opção acima</option>
      </select>
    </div>

    <!-- DESTINATÁRIO -->
    <div class="mb-3">
      <label>Destinatário</label>
      <select class="form-select" name="destinatario">
        <option selected value="">Selecionar</option>
        {% for id in destinatarios %}
        <option value="{{destinatarios[id]}}">{{destinatarios[id]}}</option>
        {% endfor %}
      </select>
    </div>

    <!-- DESCRIÇÃO -->
    <div class="mb-4">
      <label>Descrição</label>
      <input class="form-control" type="text" name="descricao" />
    </div>

    <!-- BOTÃO -->
    <button type="submit" class="btn btn-primary btn-submit">
      Salvar Lançamento
    </button>
  </form>
</div>

<!-- === SCRIPTS ORIGINAIS (INALTERADOS) === -->

<script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const DateTime = luxon.DateTime;
    document.getElementById("date").value = DateTime.now()
      .setZone("America/Sao_Paulo")
      .toFormat("yyyy-MM-dd");
  });
</script>

<script>
  const select1 = document.getElementById("categoria");
  const select2 = document.getElementById("especie");

  const optionsMap = {
    pessoal: [
      { value: "operacional", text: "Operacional" },
      { value: "administrativo", text: "Administrativo" },
    ],
    publicidade: [
      { value: "google ads", text: "Google Ads" },
      { value: "meta", text: "Meta" },
      { value: "rádio", text: "Rádio" },
      { value: "TV", text: "TV" },
    ],
    escritório: [
      { value: "aluguel", text: "Aluguel" },
      { value: "água", text: "Água" },
      { value: "energia", text: "Energia" },
      { value: "internet", text: "Internet" },
      { value: "celular", text: "Celular" },
      { value: "equipamentos", text: "Equipamentos" },
    ],
    comissão: [
      { value: "operacional", text: "Operacional" },
      { value: "administrativa", text: "Administrativa" },
    ],
    transporte: [
      { value: "combustível", text: "Combustível" },
      { value: "passagem", text: "Passagem" },
    ],
  };

  select1.addEventListener("change", () => {
    select2.innerHTML = "<option value=''>Selecione uma opção</option>";
    if (optionsMap[select1.value]) {
      optionsMap[select1.value].forEach((opt) => {
        const o = document.createElement("option");
        o.value = opt.value;
        o.text = opt.text;
        select2.appendChild(o);
      });
    }
  });
</script>

<script>
  const inputValor = document.getElementById("amount");
  inputValor.addEventListener("input", () => {
    let valor = inputValor.value.replace(/\D/g, "");
    const parteInteira = valor.slice(0, -2);
    const parteDecimal = valor.slice(-2);
    inputValor.value =
      parteInteira.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + "," + parteDecimal;
  });
</script>

{% endblock %}
