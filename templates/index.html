{% extends "layout.html" %} {% block title %}HomePage{% endblock %} {% block
content %}

<style>
  .dashboard-title {
    font-weight: 800;
    color: #0d5590;
    margin-top: 20px;
    margin-bottom: 5px;
    text-align: center;
  }

  .dashboard-subtitle {
    text-align: center;
    color: #555;
    margin-bottom: 30px;
    font-size: 0.95rem;
  }

  .dashboard-container {
    background: #ffffff;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 6px 22px rgba(0, 0, 0, 0.08);
  }

  .dashboard-card {
    display: block;
    background: linear-gradient(135deg, #0d5590, #0b4778);
    color: #fff;
    padding: 22px;
    border-radius: 18px;
    margin-bottom: 18px;
    text-align: center;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: all 0.25s ease;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
  }

  .dashboard-card h5 {
    margin: 0;
    font-size: 1.1rem;
  }

  .dashboard-card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
    text-decoration: none;
    color: #fff;
  }

  /* Variações sutis de cor */
  .card-secondary {
    background: linear-gradient(135deg, #6c757d, #5a6268);
  }

  .card-success {
    background: linear-gradient(135deg, #198754, #157347);
  }

  .card-warning {
    background: linear-gradient(135deg, #ffc107, #e0a800);
    color: #000;
  }

  .card-danger {
    background: linear-gradient(135deg, #ff1707, #e00000f1);
  }

  .card-warning:hover {
    color: #000;
  }

  @media (min-width: 768px) {
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }
  }
</style>

<h2 class="dashboard-title">Bem-vindo(a)</h2>
<p class="dashboard-subtitle">{{ user_email }}</p>

<div class="dashboard-container">
  <div class="dashboard-grid">
    <a class="dashboard-card" href="{{ url_for('novo_lancamento') }}">
      <h5>Novo Lançamento</h5>
    </a>

    <a
      class="dashboard-card card-secondary"
      href="{{ url_for('lancamentos') }}"
    >
      <h5>Lançamentos</h5>
    </a>

    <a class="dashboard-card" href="{{ url_for('lancamento_programado') }}">
      <h5>Lançamento Programado</h5>
    </a>

    <a
      class="dashboard-card card-warning"
      href="{{ url_for('ordens_servico') }}"
    >
      <h5>Ordens de Serviço</h5>
    </a>

    <a
      class="dashboard-card card-success"
      href="{{ url_for('transacao_pendente') }}"
    >
      <h5>OS's a Receber</h5>
    </a>

    <a
      class="dashboard-card card-success"
      href="{{ url_for('transacoes_confirmadas') }}"
    >
      <h5>OS's Recebidas</h5>
    </a>
    <a class="dashboard-card card-danger" href="{{ url_for('ocorrencias') }}">
      <h5>Ocorrências</h5>
    </a>
  </div>
</div>

{% endblock %}
